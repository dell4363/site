<!doctype html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login POST Demo</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.5;
      background: linear-gradient(135deg, #dbeafe, #bfdbfe, #93c5fd);
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-bottom: 20px;
    }

    input,
    button {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      cursor: pointer;
      background: white;
    }

    #error {
      color: #b91c1c;
      margin-top: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login HTTP POST Demo</h1>

    <form id="loginForm">
      <input
        type="text"
        name="username"
        placeholder="Username"
        required
      >

      <input
        type="password"
        name="password"
        placeholder="Password"
        required
      >

      <button type="submit">Send POST</button>
    </form>

    <div id="error"></div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const error = document.getElementById("error");

    const validUsername = "admin";
    const validPassword = "123456";

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      error.textContent = "";

      const formData = new FormData(form);

      const payload = {
        username: formData.get("username"),
        password: formData.get("password")
      };

      try {
        await fetch("https://httpbin.org/post", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        if (
          payload.username === validUsername &&
          payload.password === validPassword
        ) {
          const newWindow = window.open("", "_blank");
          newWindow.document.write(`
            <!doctype html>
            <html lang="el">
            <head>
              <meta charset="UTF-8">
              <title>Welcome</title>
              <style>
                body {
                  font-family: Arial, sans-serif;
                  padding: 40px;
                  line-height: 1.8;
                  background: #f8fafc;
                }
              </style>
            </head>
            <body>
              <h2>Καλώς ήρθες</h2>
              <p>Αυτή είναι η πρώτη γραμμή του κειμένου.</p>
              <p>Αυτή είναι η δεύτερη γραμμή του κειμένου.</p>
              <p>Αυτή είναι η τρίτη γραμμή του κειμένου.</p>
              <p>Αυτή είναι η τέταρτη γραμμή του κειμένου.</p>
              <p>Αυτή είναι η πέμπτη γραμμή του κειμένου.</p>
            </body>
            </html>
          `);
          newWindow.document.close();
        } else {
          error.textContent = "Λάθος username ή password.";
        }
      } catch (err) {
        error.textContent = "Request failed: " + err.message;
      }
    });
  </script>
</body>
</html>
