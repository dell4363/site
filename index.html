<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login System</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#1e3c72,#2a5298);
    }

    .box{
        background:white;
        padding:40px;
        border-radius:15px;
        width:350px;
        box-shadow:0 0 20px rgba(0,0,0,0.3);
        text-align:center;
    }

    input{
        width:100%;
        padding:12px;
        margin:10px 0;
        border:1px solid #ccc;
        border-radius:8px;
    }

    button{
        width:100%;
        padding:12px;
        border:none;
        border-radius:8px;
        background:#2a5298;
        color:white;
        font-size:18px;
        cursor:pointer;
    }

    button:hover{
        background:#1e3c72;
    }

    .error{
        color:red;
        margin-top:10px;
        display:none;
    }

    #welcome-page{
        display:none;
        color:white;
        font-size:40px;
        text-align:center;
    }
</style>
</head>

<body>

<div class="box" id="login-page">

    <h2>Login</h2>

    <form method="POST">

    <input type="text" name="username" placeholder="Username">

    <input type="password" name="password" placeholder="Password">

    <button type="submit">Login</button>

</form>>

    <div class="error" id="error-msg">
        Λάθος στοιχεία!
    </div>

</div>

<div id="welcome-page">
    <h1>Καλώς ήρθες!</h1>
</div>

</body>
</html>
